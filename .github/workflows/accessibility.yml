name: Accessibility CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  accessibility:
    name: Lint, unit + a11y tests, pa11y
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (includes eslint-plugin-jsx-a11y)
        run: npm run lint

      - name: Run unit and axe-based a11y tests
        env:
          CI: true
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build

      - name: Run pa11y-ci against the built app
        run: npm run pa11y
